
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Focus Timer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Pomodoro Timer</h1>
        <div class="timer-display" id="time">25:00</div>
        
        <div class="controls">
            <button id="start-btn" class="btn primary">Старт</button>
            <button id="pause-btn" class="btn warning">Пауза</button>
            <button id="reset-btn" class="btn danger">Сброс</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
